
<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Anexa - Crie, remixe e gere variações visuais de alta fidelidade usando IA Gemini 3.0 Pro.">
    <meta name="theme-color" content="#000000">
    
    <title>Anexa | Future Visuals</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#050505',
                        surface: 'rgba(24, 24, 27, 0.3)',
                        surfaceHover: 'rgba(255, 255, 255, 0.05)',
                        borderSubtle: 'rgba(255, 255, 255, 0.1)',
                        borderFocus: 'rgba(255, 255, 255, 0.2)',
                        textPrimary: '#ffffff',
                        textSecondary: '#a1a1aa',
                        neon: {
                            400: '#f4f4f5',
                            500: '#ffffff',
                            600: '#e4e4e7',
                        },
                        electric: {
                            400: '#406aff',
                            500: '#0236C5',
                            600: '#002080',
                            900: '#000d33'
                        }
                    },
                    fontFamily: {
                        sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    spacing: {
                        'sm': '8px',
                        'md': '16px',
                        'lg': '24px',
                        'xl': '32px',
                        'xxl': '40px'
                    },
                    borderRadius: {
                        'sm': '8px',
                        'md': '16px',
                        'lg': '24px',
                        'xl': '32px',
                        'pill': '9999px'
                    },
                    animation: {
                        'spin-slow': 'spin 12s linear infinite',
                        'fade-in': 'fadeIn 0.6s ease-out forwards',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 3s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        glow: {
                            'from': { boxShadow: '0 0 10px -10px #ffffff' },
                            'to': { boxShadow: '0 0 20px 5px rgba(255, 255, 255, 0.2)' }
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
        }
        
        /* Minimalist Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #0236C5; }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Ultra-Modern Glassmorphism */
        .glass-panel {
            background: rgba(24, 24, 27, 0.3);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            border-radius: 24px;
        }

        /* Subtle Input Styling */
        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            transition: all 1000ms cubic-bezier(0.44, 0, 0.56, 1);
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }

        /* Radial Gradients (Backdrops) */
        .radial-glow-neon {
            background: radial-gradient(circle, rgba(2, 54, 197, 0.05) 0%, rgba(0,0,0,0) 60%);
        }
        .radial-glow-electric {
            background: radial-gradient(circle, rgba(2, 54, 197, 0.1) 0%, rgba(0,0,0,0) 60%);
        }

        .text-gradient-main {
            background: linear-gradient(90deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .text-gradient-blue {
            background: linear-gradient(135deg, #a1a1aa 0%, #0236C5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Utility */
        .btn-hover-effect {
            position: relative;
            overflow: hidden;
            border-radius: 9999px;
            transition: all 1000ms cubic-bezier(0.44, 0, 0.56, 1);
        }
        .btn-hover-effect::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 1000ms cubic-bezier(0.44, 0, 0.56, 1);
        }
        .btn-hover-effect:hover::after {
            left: 100%;
        }

        @keyframes scrollRight {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }
        @keyframes scrollLeft {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>
